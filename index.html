<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAMME.COM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            font-size: 4.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin: 0;
            line-height: 1.1;
        }
        .tagline {
            font-size: 1.1rem;
            font-weight: 400;
            margin-top: 30px;
            letter-spacing: 0.15em;
            color: #b0b0b0;
        }
        .button {
            display: inline-block;
            background-color: transparent;
            color: #ffffff;
            padding: 15px 40px;
            text-decoration: none;
            border: 1px solid #ffffff;
            border-radius: 50px;
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            margin-top: 60px;
            transition: all 0.4s ease;
        }
        .button:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AIAMME.COM</h1>
        <p class="tagline">The future has a new name.</p>
        <a href="mailto:acquisition_aiamme@proton.me" class="button">Claim the name</a>
    </div>
</body>
</html>
